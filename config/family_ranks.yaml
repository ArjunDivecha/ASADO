# =============================================================================
# FILE: config/family_ranks.yaml
# =============================================================================
#
# INPUT FILES: none (this file IS the source of truth for the family panel).
# CONSUMED BY:
#   - /Users/arjundivecha/Dropbox/AAA Backup/A Working/ASADO/scripts/loop/build_family_ranks.py
#     (nightly: builds the tidy loop table `family_ranks_daily`)
#   - /Users/arjundivecha/Dropbox/AAA Backup/A Working/ASADO/cos_mockups/build_cockpit_data.py
#     (reads verdict/IC metadata for the Consensus Matrix column headers)
#
# VERSION: 1.0
# LAST UPDATED: 2026-07-01
# AUTHOR: Arjun Divecha (built by agent session, Frontend Alpha Rethink PRD §4.2)
#
# DESCRIPTION:
# The registry of validated signal FAMILIES that power the cockpit's Consensus
# Matrix (P2) and Edge Board (P1). This is the first increment of the unified
# signal panel (data-structure audit R1): one row per family, declaring the
# source loop table, variable, REGISTERED direction, harness verdict + stats,
# and the registered universe. build_family_ranks.py converts each family's
# latest cross-section into ranks; nothing here is re-derived or re-optimized.
#
# EPISTEMIC RULES (do not weaken):
# - direction comes from the REGISTERED sweep spec (config/sweeps/*.yaml),
#   never from re-fitting. higher_is_better = high value ranks long.
# - verdict/ic/nw_t are the harness's numbers for the cited hypothesis_id.
#   The cockpit displays them verbatim; it never upgrades them.
# - `count_in_agreement: false` families are shown but EXCLUDED from the
#   cross-family agreement count (the combiner is trained on several of the
#   other columns — counting it would double-count; ToT is an untested
#   detector substrate, context not a validated rank).
# - universe = the registered honest universe. Countries outside it get NO
#   rank row for that family (absence is honest, not zero).
# =============================================================================

