# ============================================================================
# ASADO Forward Event Calendar Seed (Alpha-Hunting Loop Phase 3, Priority 5)
# ============================================================================
# Hand-curated FORWARD-looking scheduled events: central bank decision dates,
# elections, and index reviews. Complements event_log_seed.yaml (backward-
# looking history). Loaded into the LOOP DuckDB (Data/loop/asado_loop.duckdb,
# table `forward_calendar`) by scripts/loop/build_forward_calendar.py.
#
# RULES (FAIL-IS-FAIL):
# - Every date here was verified against a primary or near-primary source on
#   the date in `verified_on`. NO dates from memory.
# - date_confirmed: false marks events whose month is certain but whose exact
#   day is not yet published (e.g. FTSE implementation day).
# - When a scheduled event has happened, the daily builder simply stops
#   showing it (event_date < today); entries are kept for audit.
#
# Category vocabulary: central_bank, election, index_review
# Severity: high, medium, low
# countries_affected: comma-separated T2 names; null = see is_global
#
# VERSION: 1.0   LAST UPDATED: 2026-06-10   AUTHOR: Claude (verified via web)
# ============================================================================

