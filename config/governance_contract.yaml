#     (A1: derives per-step expected outputs -> Data/loop/governance/run_manifest.json)
#   - /Users/arjundivecha/Dropbox/AAA Backup/A Working/ASADO/scripts/loop/build_governance_scorecard.py
#     (A8, future: reads `scorecard_dimensions` below — NOT a separate hand list —
