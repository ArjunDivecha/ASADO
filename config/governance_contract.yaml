#
# VERSION: 1.2
# LAST UPDATED: 2026-07-01
# AUTHOR: Arjun Divecha (built by agent session, Governance Layer PRD v1.2, item A1)
#   v1.1: added check_loop_schema (data-structures audit R5 — consumer-column
#         drift guard over config/loop_schema_contract.yaml)
#   v1.2: Frontend Alpha Rethink Phase 2 — build_family_ranks (required),
#         build_fable_connections (optional, API-gated) and the final
#         refresh_cockpit_data / refresh_live_cockpit pair (optional)
#
# DESCRIPTION:
# The SINGLE source-controlled list of (a) every nightly loop step and the
# concrete output it must produce, and (b) the governance scorecard dimensions.
# A generator (run_manifest.py) turns the `steps` block into the run manifest's
# per-step expectations; A8's scorecard reads `scorecard_dimensions`. Because
# both come from this one file, the two trust lists cannot drift (the v1.2
# fix to GPT review finding #2). This file is a GIT-TRACKED TRUST ROOT: A8's
# config guard reds the scorecard if it is uncommitted/dirty.
#
# STALENESS MODEL (verified during A1 recon):
#   expected_outputs[].kind:
#     file          -> a real file path; staleness checked on its mtime.
#     loop_db_table -> a table in Data/loop/asado_loop.duckdb; checked for
#                      EXISTENCE + non-empty only (the shared DB file's mtime
#                      advances on every write, so file-mtime cannot tell which
#                      step refreshed — table existence is the honest v1 check).
#   staleness (file only): mtime | existence
#     mtime     -> the file MUST have been rewritten this run (mtime advanced
#                  past the step's started_ts). Use only for genuinely
#                  daily-rewritten outputs (brief, combiner, graph/twin/leadlag
#                  features, country returns, calibration, JST report).
#     existence -> file must exist + be non-empty, but is NOT required to be
#                  rewritten nightly (gated/monthly/cached outputs: tot_shares
#                  7d gate, WEO 24h cache, month-end blocks, BBG parquets).
#   optional: true -> a skip / exit-2 (PARTIAL) for this step is NOT a hard
#                     fail (Bloomberg-down nights, GDELT rate-limit, etc.).
#   governance: true -> this step is itself a governance checkpoint (A3/A5/A6
#                       etc. live inside it).
# =============================================================================

schema_version: 1
