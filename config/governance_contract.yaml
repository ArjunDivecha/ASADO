# -----------------------------------------------------------------------------
# Scorecard dimensions (A8 reads THIS list, not a separate hand list).
# A1 only declares them; A8 computes red/amber/green per dimension and writes
# governance_scorecard.json. severity = the colour a FAILED dimension takes.
# `owner_item` = the PRD Phase-A item that implements the check.
# `amber_by_design` = the dimension can never be green in Phase A (partial by
# construction, e.g. A7 cross_source_minimal until the Phase-C full sweep).
# -----------------------------------------------------------------------------
scorecard_dimensions:
  - name: run_manifest
    owner_item: A1
    severity: red
    description: "No nightly step is fail/stale/missing-output in run_manifest.json."
  - name: liveness
    owner_item: A2
    severity: red
    description: "Loop ran, exited 0, today's brief is present AND committed."
  - name: ledger_integrity
    owner_item: A3
    severity: red
    description: "fold raises on unknown events; retired/rejected never read as live; counts conserve."
  - name: family_registry
    owner_item: A5
    severity: red
    description: "Every family_key is canonical; primary_horizon frozen; migration diff balances."
  - name: pit_lag_proof
    owner_item: A6
    severity: red
    description: "No daily signal resolves publication_lag=0 without a valid pit_proof."
  - name: cross_source_minimal
    owner_item: A7
    severity: amber
    amber_by_design: false
    description: "Status-driven: green when sentinels + pair checks pass AND coverage >=90% of critical mapped series; amber on partial coverage or soft pair discrepancy; red on hard sentinel breach."
  - name: config_guard
    owner_item: A8
    severity: red
    description: "All trust-root YAMLs committed (repo not dirty on config/); contract hash stamped."
