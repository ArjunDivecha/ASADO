# ── Demographic Inflation Pressure (Demographics_Inflation_Factor/) ───────

- base_variable: DIP_abs
  provider: ASADO derived (demographics)
  definition: Demographic Inflation Pressure, absolute — the inflation pressure (in CPI percentage points) implied by the country's age structure, from cohort-weighted inflation betas.
  units: percentage points of CPI
  cross_country_comparable: true
  economic_mechanism: Age cohorts differ in net consumption vs production; dependent-heavy populations are inflationary, working-age-heavy ones disinflationary. Mechanically forecastable decades ahead.
  concept: structural
  mechanism_reference: Demographics_Inflation_Factor/README.md (Juselius-Takats demographic inflation literature)

- base_variable: DIP_rel
  provider: ASADO derived (demographics)
  definition: Demographic Inflation Pressure relative to the 34-country panel mean each year, in percentage points (positive = more inflationary demographics than average).
  units: percentage points vs panel mean
  cross_country_comparable: true
  economic_mechanism: The tradeable cross-sectional form — relative demographic inflation pressure predicts relative policy tightness and real-rate differentials years ahead.
  concept: structural

- base_variable: DIP_rel_chg_5y
  provider: ASADO derived (demographics)
  definition: 5-year change in DIP_rel — how fast the country's relative demographic inflation pressure is shifting.
  units: percentage points (5y change)
  cross_country_comparable: true
  economic_mechanism: Demographic momentum — markets price levels but underweight predictable demographic drift.
  concept: structural

- base_variable: DIP_rel_chg_10y
  provider: ASADO derived (demographics)
  definition: 10-year change in DIP_rel.
  units: percentage points (10y change)
  cross_country_comparable: true
  economic_mechanism: Long-horizon demographic drift; fully forecastable from existing cohorts.
  concept: structural

