# ── World Bank QPSD — public debt structure (collect_macrostructure.py) ───

- base_variable: MS_Public_Debt_Total_Pct_GDP
  provider: World Bank QPSD
  definition: Total general government debt as percent of GDP (World Bank Quarterly Public Sector Debt).
  units: percent of GDP
  cross_country_comparable: true
  economic_mechanism: Headline debt burden at quarterly frequency — timelier than annual WDI/WEO vintages.
  concept: structural

- base_variable: MS_Public_Debt_Short_Term_Pct_GDP
  provider: World Bank QPSD
  definition: Short-term public debt as percent of GDP (QPSD).
  units: percent of GDP
  cross_country_comparable: true
  economic_mechanism: Rollover exposure — short-maturity debt must be refinanced at current rates, transmitting rate shocks to the budget fast.
  concept: structural

- base_variable: MS_Public_Debt_Short_Maturity_Pct
  provider: World Bank QPSD
  definition: Share of public debt with short residual maturity, in percent (QPSD).
  units: percent
  cross_country_comparable: true
