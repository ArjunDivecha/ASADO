  valid_range: "0 to 100"

- base_variable: MS_Public_Debt_Foreign_Currency_Pct_GDP
  provider: World Bank QPSD
  definition: Foreign-currency-denominated public debt as percent of GDP (QPSD).
  units: percent of GDP
  cross_country_comparable: true
  economic_mechanism: Original sin — FX debt inflates mechanically when the currency depreciates, the classic EM crisis amplifier.
