# ── Graph features (scripts/loop/build_graph_features.py) ─────────────────

- base_variable: GRAPH_TRADE_NBR_RET_GAP_21D
  provider: ASADO graph (Neo4j edges)
  definition: Trade-weighted neighbor 21-day return minus own 21-day return (TRADES_WITH edge weights).
  units: decimal return gap
  cross_country_comparable: true
  economic_mechanism: Shock propagation along trade links — when trading partners reprice and the country has not, the gap predicts catch-up or contagion.
  concept: network

- base_variable: GRAPH_TRADE_NBR_RET_GAP_63D
  provider: ASADO graph (Neo4j edges)
  definition: Trade-weighted neighbor 63-day return minus own 63-day return.
  units: decimal return gap
  cross_country_comparable: true
  economic_mechanism: Quarterly-horizon version of the trade propagation gap.
  concept: network

- base_variable: GRAPH_BANK_NBR_RET_GAP_21D
  provider: ASADO graph (Neo4j edges)
  definition: Banking-exposure-weighted neighbor 21-day return minus own 21-day return (HAS_BANKING_EXPOSURE_TO edges).
  units: decimal return gap
  cross_country_comparable: true
  economic_mechanism: Financial contagion channel — stress in creditor/debtor banking partners transmits through funding and credit lines.
  concept: network

- base_variable: GRAPH_BANK_NBR_RET_GAP_63D
  provider: ASADO graph (Neo4j edges)
  definition: Banking-exposure-weighted neighbor 63-day return minus own 63-day return.
  units: decimal return gap
  cross_country_comparable: true
  economic_mechanism: Quarterly-horizon banking contagion gap.
  concept: network

- base_variable: GRAPH_PORT_HOLDER_STRESS_21D
  provider: ASADO graph (Neo4j edges)
  definition: HOLDS_PORTFOLIO-weighted holder-country drawdown over 21 days — stress among the countries that own this market's securities.
  units: decimal (weighted drawdown)
  cross_country_comparable: true
  economic_mechanism: Holder-stress selling — when the investors' home markets draw down, they liquidate foreign holdings, pressuring this market regardless of local fundamentals.
  concept: network

- base_variable: GRAPH_TWOHOP_TRADE_GAP_21D
  provider: ASADO graph (Neo4j edges)
  definition: Two-hop trade propagation gap — middle trading partner repriced (|z|>1) while the endpoint has not (|z|<0.5).
  units: decimal return gap
  cross_country_comparable: true
  economic_mechanism: Indirect shock transmission — supply-chain shocks travel two hops with a lag the market is slow to price.
  concept: network

- base_variable: GRAPH_NBR_DRAWDOWN_COUNT
  provider: ASADO graph (Neo4j edges)
  definition: Edge-weighted count of neighbor countries in greater than 10 percent drawdown (contagion pressure).
  units: weighted count
  cross_country_comparable: true
  economic_mechanism: Neighborhood stress density — when many connected economies are drawing down simultaneously, contagion probability rises non-linearly.
  concept: network

