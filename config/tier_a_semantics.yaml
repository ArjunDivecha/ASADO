- base_variable: MS_Public_Debt_Domestic_Currency_Pct_GDP
  provider: World Bank QPSD
  definition: Domestic-currency public debt as percent of GDP (QPSD).
  units: percent of GDP
  cross_country_comparable: true
  economic_mechanism: Inflatable debt — local-currency debt can be eroded by inflation rather than defaulted on.
