- base_variable: MS_Public_Debt_Domestic_Creditors_Pct_GDP
  provider: World Bank QPSD
  definition: Public debt held by domestic creditors as percent of GDP (QPSD).
  units: percent of GDP
  cross_country_comparable: true
  economic_mechanism: Captive domestic investor base — stickier funding, but deepens the bank-sovereign doom loop.
