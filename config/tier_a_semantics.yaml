# ── ASADO-derived macrostructure composites (collect_macrostructure.py) ───

- base_variable: MS_CentralBank_SovDebt_Share
  provider: ASADO derived
  definition: Central bank claims on central government as a share of total public debt (transparent public-data proxy; QPSD denominator preferred, WEO fallback).
