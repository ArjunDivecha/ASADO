# =========================================================================
# ASADO Variable Registry — CURATED SEMANTICS SEED
# =========================================================================
# Source of truth for variable-level semantics (definition, units, sign,
# PIT fields, mechanism). Loaded into DuckDB table `variable_registry` by
# scripts/build_variable_registry.py.
#
# RULES:
# - This file is HAND-CURATED. The build script only APPENDS skeleton
#   entries for newly-appeared variables; it never edits existing ones.
# - review_status: 'verified' may only be set by a human. Agents must use
#   'model_drafted' for any field they fill and 'unknown' when unsure.
# - sign values were extracted from the live flip lists in
#   t2_normalize.py / econ_normalize.py / gdelt_normalize.py — see
#   build_variable_registry.py header for the full convention.
# - Auto-facts (row counts, dates, freshness) do NOT live here; they are
#   regenerated into `variable_registry_facts` on every build.
# =========================================================================

