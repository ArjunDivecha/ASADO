[theme]
base = "dark"
primaryColor = "#3B82F6"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#16171D"
textColor = "#FAFAFA"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#0E1117"
textColor = "#B0B3C2"

[server]
headless = true
enableStaticServing = true
runOnSave = true

[browser]
serverAddress = "localhost"
